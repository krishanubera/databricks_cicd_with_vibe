# App / data product bundle (jobs, pipelines, notebooks, etc.)
# See: https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: databricks_cicd_with_vibe

# Workspace host: from DATABRICKS_HOST (CI) or CLI profile — omit here so env auth applies

include:
  - resources/jobs/**/*.yml
  - resources/models/**/*.yml
  - resources/apps/**/*.yml

# Environments (use: databricks bundle deploy -t dev --profile <profile>)
# /Shared/.bundle/... is world-writable; permissions below acknowledge intentional shared access (CLI warning).
targets:
  dev:
    default: true
    # production mode avoids [dev <username>] prefixes on deployed resource names
    mode: production
    permissions:
      - group_name: users
        level: CAN_MANAGE
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/dev

  # CI: push to release_* → deploy -t test (same workspace as dev/prod; separate bundle root_path)
  test:
    mode: production
    permissions:
      - group_name: users
        level: CAN_MANAGE
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/test

  prod:
    mode: production
    permissions:
      - group_name: users
        level: CAN_MANAGE
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/prod

# Lakeflow pipeline: define here so library paths are relative to the bundle root (src/...).
resources:
  pipelines:
    diagnostics_lab_results_pipeline:
      name: diagnostics_lab_results_pipeline
      catalog: cicd_with_vibe
      target: diagnostics
      channel: CURRENT
      development: false
      serverless: true
      continuous: false
      edition: CORE
      libraries:
        - file:
            path: src/pipelines/diagnostics_lab_results_pipeline.py
      configuration:
        bundle.sourcePath: /Workspace/${workspace.file_path}/src
