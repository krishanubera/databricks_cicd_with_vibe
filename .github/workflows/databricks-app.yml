# App bundle at repo root (jobs, pipelines, …) + optional CSV upload to a volume path you manage.
# Each bundle target (dev / test / prod) maps to a GitHub Environment of the same name.
# Configure each environment (Settings → Environments): variable DATABRICKS_HOST, secret DATABRICKS_TOKEN.
# Create dev, test, and prod environments before runs that resolve to each target; test is used for release_* / PR-to-release_* flows.

name: Deploy app bundle

on:
  # Manual: Actions → select this workflow → "Run workflow" (choose dev / test / prod)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Bundle target (must match a GitHub Environment name)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - test
          - prod
  push:
    branches:
      - 'feature_*'
      - 'release_*'
  pull_request:
    branches:
      - 'release_*'

env:
  DATABRICKS_BUNDLE_ENGINE: direct
  DATABRICKS_CLI_VERSION: '0.240.0'
  BUNDLE_VERSION: '0.240.0'

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.set-target.outputs.target }}
    steps:
      - id: set-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ] && [[ "${{ github.base_ref }}" == release_* ]]; then
            echo "target=test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release_* ]]; then
            echo "target=test" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.target }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: |
          if [ "$BUNDLE_VERSION" != "$DATABRICKS_CLI_VERSION" ]; then
            echo "BUNDLE_VERSION ($BUNDLE_VERSION) must match DATABRICKS_CLI_VERSION ($DATABRICKS_CLI_VERSION)."
            exit 1
          fi
          curl -fsSL "https://raw.githubusercontent.com/databricks/setup-cli/v${DATABRICKS_CLI_VERSION}/install.sh" | sh

      - name: Verify Databricks CLI installation
        run: |
          echo "Pinned bundle/CLI intent: $BUNDLE_VERSION"
          databricks --version
          databricks bundle version

      - name: Configure Databricks authentication
        env:
          H: ${{ vars.DATABRICKS_HOST }}
          T: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "$H" ] || [ -z "$T" ]; then
            echo "❌ Set GitHub Environment variable DATABRICKS_HOST and secret DATABRICKS_TOKEN for environment '${{ needs.resolve.outputs.target }}'."
            exit 1
          fi
          echo "DATABRICKS_HOST=$H" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=$T" >> $GITHUB_ENV

      - name: Validate app bundle
        run: |
          databricks bundle validate -t ${{ needs.resolve.outputs.target }}

      - name: Deploy app bundle
        run: |
          # --auto-approve: required in CI (no TTY). May apply destructive sync if resources were removed from the bundle since a prior deploy.
          databricks bundle deploy -t ${{ needs.resolve.outputs.target }} --auto-approve

      - name: Set data upload path
        id: diagnostics-volume
        run: |
          echo "volume_path=dbfs:/Volumes/cicd_with_vibe/diagnostics/diagnostics_data" >> $GITHUB_OUTPUT

      - name: Upload CSV files to volume path
        run: |
          VOLUME_PATH="${{ steps.diagnostics-volume.outputs.volume_path }}"

          if [ ! -d "data" ]; then
            echo "⚠️  Directory not found: data"
            exit 1
          fi

          echo "Uploading CSV files to ${VOLUME_PATH}/ ..."
          uploaded=0
          for file in data/*.csv; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading ${filename}..."
              databricks fs cp --overwrite "$file" "${VOLUME_PATH}/${filename}"
              uploaded=$((uploaded + 1))
            fi
          done

          if [ "$uploaded" -eq 0 ]; then
            echo "⚠️  No .csv files in data/ — nothing to upload."
          else
            echo "✅ Uploaded ${uploaded} CSV file(s) to ${VOLUME_PATH}/"
          fi

      - name: Run diagnostics lab-results pipeline refresh
        run: |
          databricks bundle run diagnostics_lab_results_pipeline -t ${{ needs.resolve.outputs.target }}

      - name: Deployment summary
        run: |
          echo "## App bundle deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle**: \`databricks_cicd_with_vibe\` (repo root)" >> $GITHUB_STEP_SUMMARY
          echo "- **Databricks CLI (pinned)**: ${{ env.DATABRICKS_CLI_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ needs.resolve.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "- **PR**: \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Volume upload**: \`${{ steps.diagnostics-volume.outputs.volume_path }}/\` ← \`data/*.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pipeline refresh**: \`diagnostics_lab_results_pipeline\`" >> $GITHUB_STEP_SUMMARY
