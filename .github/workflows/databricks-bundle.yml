# One Databricks workspace per bundle target — set host + token for each (repository Secrets):
#   DATABRICKS_DEV_HOST, DATABRICKS_DEV_TOKEN   → bundle target dev
#   DATABRICKS_TEST_HOST, DATABRICKS_TEST_TOKEN → bundle target test
#   DATABRICKS_PROD_HOST, DATABRICKS_PROD_TOKEN → bundle target prod
# Direct bundle engine (Unity Catalog schema in resources/catalogs/; create catalog in each workspace as needed)

name: Deploy to Databricks

# feature_* push → "dev". release_* push → "test".
# PRs targeting release_* → "test" (validates/deploys the merge preview for that release branch).
# main: no automatic deploy — run manually and choose prod (checkout main in the UI).
on:
  push:
    branches:
      - 'feature_*'
      - 'release_*'
  pull_request:
    branches:
      - 'release_*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Bundle target (each uses its own workspace secrets)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  DATABRICKS_CLI_VERSION: 0.240.0
  BUNDLE_VERSION: 0.240.0
  DATABRICKS_BUNDLE_ENGINE: direct

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "$HOME/.databricks/bin" >> $GITHUB_PATH

      - name: Verify Databricks CLI installation
        run: |
          databricks --version
          databricks bundle version

      - name: Set deployment target
        id: set-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ] && [[ "${{ github.base_ref }}" == release_* ]]; then
            # PR into release_* → test (github.ref is refs/pull/.../merge, so use base_ref)
            echo "target=test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release_* ]]; then
            echo "target=test" >> $GITHUB_OUTPUT
          else
            # push on feature_* (see on:)
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure Databricks authentication
        env:
          DEV_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DEV_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
          TEST_HOST: ${{ secrets.DATABRICKS_TEST_HOST }}
          TEST_TOKEN: ${{ secrets.DATABRICKS_TEST_TOKEN }}
          PROD_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          PROD_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: |
          TARGET="${{ steps.set-target.outputs.target }}"
          case "$TARGET" in
            dev)
              H="$DEV_HOST"; T="$DEV_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_DEV_HOST and DATABRICKS_DEV_TOKEN"
              ;;
            test)
              H="$TEST_HOST"; T="$TEST_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_TEST_HOST and DATABRICKS_TEST_TOKEN"
              ;;
            prod)
              H="$PROD_HOST"; T="$PROD_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_PROD_HOST and DATABRICKS_PROD_TOKEN"
              ;;
            *)
              echo "❌ Unknown bundle target: $TARGET"
              exit 1
              ;;
          esac
          if [ -z "$H" ] || [ -z "$T" ]; then
            echo "❌ $MISSING_MSG (host and token required for this environment)."
            exit 1
          fi
          echo "DATABRICKS_HOST=$H" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=$T" >> $GITHUB_ENV

      - name: Validate bundle configuration
        run: |
          databricks bundle validate -t ${{ steps.set-target.outputs.target }}

      - name: Deploy bundle to Databricks
        run: |
          databricks bundle deploy -t ${{ steps.set-target.outputs.target }}

      # UC volume: resources/catalogs/catalog.yml → cicd_with_vibe.diagnostics.diagnostics_data
      - name: Set diagnostics volume path
        id: diagnostics-volume
        run: |
          echo "volume_path=dbfs:/Volumes/cicd_with_vibe/diagnostics/diagnostics_data" >> $GITHUB_OUTPUT

      - name: Upload CSV files to managed volume
        run: |
          VOLUME_PATH="${{ steps.diagnostics-volume.outputs.volume_path }}"

          if [ ! -d "data" ]; then
            echo "⚠️  Directory not found: data"
            exit 1
          fi

          echo "Uploading CSV files to ${VOLUME_PATH}/ ..."
          uploaded=0
          for file in data/*.csv; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading ${filename}..."
              databricks fs cp --overwrite "$file" "${VOLUME_PATH}/${filename}"
              uploaded=$((uploaded + 1))
            fi
          done

          if [ "$uploaded" -eq 0 ]; then
            echo "⚠️  No .csv files in data/ — nothing to upload."
          else
            echo "✅ Uploaded ${uploaded} CSV file(s) to ${VOLUME_PATH}/"
          fi

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle target**: ${{ steps.set-target.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "- **PR**: \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle**: databricks_cicd_with_vibe" >> $GITHUB_STEP_SUMMARY
          echo "- **Volume upload**: \`${{ steps.diagnostics-volume.outputs.volume_path }}/\` ← \`data/*.csv\`" >> $GITHUB_STEP_SUMMARY
