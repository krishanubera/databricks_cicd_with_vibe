# Unity Catalog bundle under bundles/unity-catalog — catalogs, schemas, volumes only.

name: Deploy Unity Catalog bundle

on:
  # Manual: Actions → select this workflow → "Run workflow" (choose dev / test / prod)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Bundle target (dev / test / prod workspace)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - test
          - prod
  push:
    branches:
      - 'feature_*'
      - 'release_*'
    paths:
      - 'bundles/unity-catalog/**'
  pull_request:
    branches:
      - 'release_*'
    paths:
      - 'bundles/unity-catalog/**'

defaults:
  run:
    working-directory: bundles/unity-catalog

env:
  DATABRICKS_BUNDLE_ENGINE: direct

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "$HOME/.databricks/bin" >> $GITHUB_PATH

      - name: Verify Databricks CLI installation
        run: |
          databricks --version
          databricks bundle version

      - name: Set deployment target
        id: set-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ] && [[ "${{ github.base_ref }}" == release_* ]]; then
            echo "target=test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release_* ]]; then
            echo "target=test" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure Databricks authentication
        env:
          DEV_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DEV_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
          TEST_HOST: ${{ secrets.DATABRICKS_TEST_HOST }}
          TEST_TOKEN: ${{ secrets.DATABRICKS_TEST_TOKEN }}
          PROD_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          PROD_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: |
          TARGET="${{ steps.set-target.outputs.target }}"
          case "$TARGET" in
            dev)
              H="$DEV_HOST"; T="$DEV_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_DEV_HOST and DATABRICKS_DEV_TOKEN"
              ;;
            test)
              H="$TEST_HOST"; T="$TEST_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_TEST_HOST and DATABRICKS_TEST_TOKEN"
              ;;
            prod)
              H="$PROD_HOST"; T="$PROD_TOKEN"
              MISSING_MSG="Set repository secrets: DATABRICKS_PROD_HOST and DATABRICKS_PROD_TOKEN"
              ;;
            *)
              echo "❌ Unknown bundle target: $TARGET"
              exit 1
              ;;
          esac
          if [ -z "$H" ] || [ -z "$T" ]; then
            echo "❌ $MISSING_MSG (host and token required for this environment)."
            exit 1
          fi
          echo "DATABRICKS_HOST=$H" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=$T" >> $GITHUB_ENV

      - name: Validate Unity Catalog bundle
        run: |
          databricks bundle validate -t ${{ steps.set-target.outputs.target }}

      - name: Deploy Unity Catalog bundle
        run: |
          # --auto-approve: required in CI (no TTY). Removing UC resources from the bundle may delete them on deploy.
          databricks bundle deploy -t ${{ steps.set-target.outputs.target }} --auto-approve

      - name: Deployment summary
        run: |
          echo "## Unity Catalog bundle deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle**: \`databricks_cicd_with_vibe_uc\` (\`bundles/unity-catalog\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ steps.set-target.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resources**: catalog \`cicd_with_vibe\`, schema \`diagnostics\`, volume \`diagnostics_data\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "- **PR**: \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
