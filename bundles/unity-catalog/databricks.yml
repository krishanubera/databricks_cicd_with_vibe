# Unity Catalog bundle — deploy separately from the app bundle (jobs, pipelines, etc.).
# Catalog + schema are expected to exist; this bundle manages the managed volume only.
# Usage: databricks bundle deploy -t <dev|test|prod> (from this directory or pass path in CI)

bundle:
  name: databricks_cicd_uc

targets:
  dev:
    default: true
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/dev

  test:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/test

  staging:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/staging

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/prod

include:
  - resources/**/*.yml
