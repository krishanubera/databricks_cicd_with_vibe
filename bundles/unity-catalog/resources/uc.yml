# Unity Catalog objects used by the app workflow CSV upload:
# dbfs:/Volumes/cicd_with_vibe/diagnostics/diagnostics_data
#
# Deploy order: run this bundle (or the unity-catalog GitHub workflow) before the app bundle
# if the volume does not exist yet.
#
# Grant privileges must match the bundle schema (see Databricks CLI Python docs:
# databricks.bundles.volumes.VolumeGrantPrivilege). Volumes use READ_VOLUME / WRITE_VOLUME,
# not READ_FILES / WRITE_FILES (invalid values can prevent the volume from being created).

resources:
  catalogs:
    cicd_with_vibe:
      name: cicd_with_vibe
      comment: Catalog for databricks_cicd_with_vibe demo (CI/CD + volume data)
      grants:
        - principal: users
          privileges:
            - USE_CATALOG

  schemas:
    diagnostics:
      name: diagnostics
      # Literal parent name avoids any interpolation edge cases during deploy
      catalog_name: cicd_with_vibe
      comment: Schema for diagnostics lab data and volumes
      grants:
        - principal: users
          privileges:
            - USE_SCHEMA

  volumes:
    diagnostics_data:
      name: diagnostics_data
      catalog_name: cicd_with_vibe
      schema_name: diagnostics
      volume_type: MANAGED
      comment: Managed volume for workflow CSV uploads (data/*.csv)
      grants:
        - principal: users
          privileges:
            - READ_VOLUME
            - WRITE_VOLUME
